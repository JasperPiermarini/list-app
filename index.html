<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dor Jobs List</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- User picker overlay -->
  <div id="user-picker">
    <div class="picker-box">
      <p class="picker-label">Who are you?</p>
      <div class="picker-btns">
        <button class="picker-btn" data-user="Dorien">Dorien</button>
        <button class="picker-btn" data-user="Jasper">Jasper</button>
      </div>
    </div>
  </div>

  <div class="container" id="app" style="display:none">
    <header>
      <h1>Dor Jobs List</h1>
      <p class="subtitle" id="summary"></p>
    </header>

    <form id="task-form">
      <div class="form-row">
        <input type="text" id="task-input" placeholder="Job description" required />
        <input placeholder="Due date" type="date" id="due-input" />
        <button type="submit">Add</button>
      </div>
      <div class="form-row form-row--meta">
        <input type="url" id="link-input" placeholder="Link (optional)" />
        <select id="assignee-input">
          <option value="Dorien">Dorien</option>
          <option value="Jasper">Jasper</option>
        </select>
        <input type="text" id="tags-input" placeholder="Tags (comma separated)" />
      </div>
    </form>

    <div class="filter-group">
      <div class="filter-row">
        <div class="filters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="active">Active</button>
          <button class="filter-btn" data-filter="completed">Completed</button>
        </div>
        <div class="filters filters--sort">
          <span class="filter-label">Sort</span>
          <button class="sort-btn active" data-sort="created">Date Added</button>
          <button class="sort-btn" data-sort="due">Due Date</button>
        </div>
      </div>
      <div class="filters filters--people">
        <button class="person-btn active" data-person="all">Everyone</button>
        <button class="person-btn" data-person="Dorien">Dorien</button>
        <button class="person-btn" data-person="Jasper">Jasper</button>
      </div>
    </div>

    <div id="tag-filter-bar"></div>

    <ul id="task-list"></ul>

    <footer id="footer" class="hidden">
      <span id="remaining"></span>
      <button id="clear-completed">Clear completed</button>
    </footer>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="app.js"></script>
</body>
</html>
